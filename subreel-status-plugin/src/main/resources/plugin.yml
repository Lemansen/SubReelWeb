name: SubreelStatusBridge
version: ${version}
main: online.subreel.status.SubreelStatusPlugin
api-version: '1.21'
author: Subreel
description: Exposes a protected local HTTP endpoint with live Paper server status for the website.
commands:
  subreelstats:
    description: Manage Subreel statistics profiles.
    usage: /subreelstats purge <nick|uuid> | /subreelstats purgebanned | /subreelstats merge <from> <to>
    permission: subreelstats.manage
permissions:
  subreelstats.manage:
    description: Allows managing Subreel stats profiles.
    default: op

